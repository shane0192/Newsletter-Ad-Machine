<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --border: #1e1e1e;
  --border-hover: #2a2a2a;
  --text: #ffffff;
  --text-muted: #777777;
  --text-dim: #444444;
  --accent: #4FDAED;
  --accent-glow: rgba(79, 218, 237, 0.15);
  --accent-glow-strong: rgba(79, 218, 237, 0.25);
  --accent-text: #0a0a0a;
  --radius: 12px;
  --radius-lg: 16px;
}

[data-theme="light"] {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --border: #e0e0e0;
  --border-hover: #cccccc;
  --text: #111111;
  --text-muted: #666666;
  --text-dim: #999999;
  --accent: #0aafc4;
  --accent-glow: rgba(10, 175, 196, 0.1);
  --accent-glow-strong: rgba(10, 175, 196, 0.18);
  --accent-text: #ffffff;
}

body {
  font-family: 'Bricolage Grotesque', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

html { scroll-behavior: smooth; }

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 48px 20px 64px;
}

/* Header */
.header {
  margin-bottom: 16px;
  opacity: 0;
  transform: translateY(12px);
  animation: slideUp 0.6s ease forwards;
}
.logo {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -1px;
}
.logo-dot { color: var(--accent); }
.tagline {
  font-size: 14px;
  color: var(--text-muted);
  margin-top: 4px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 500;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 32px;
  opacity: 0;
  animation: slideUp 0.5s ease 0.1s forwards;
  transition: opacity 0.2s;
}
.back-link:hover { opacity: 0.8; }

.intro {
  font-size: 15px;
  color: var(--text-muted);
  margin-bottom: 32px;
  line-height: 1.7;
  max-width: 600px;
  opacity: 0;
  animation: slideUp 0.5s ease 0.15s forwards;
}

/* Filter */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 32px;
  opacity: 0;
  animation: slideUp 0.5s ease 0.2s forwards;
}
.filter-btn {
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: 100px;
  background: transparent;
  color: var(--text-muted);
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s ease;
}
.filter-btn:hover {
  border-color: var(--border-hover);
  color: var(--text);
}
.filter-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-glow);
}

/* Play Cards */
.play-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px 32px;
  margin-bottom: 12px;
  transition: border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
  cursor: pointer;
  opacity: 0;
  transform: translateY(8px);
  animation: slideUp 0.4s ease forwards;
}
.play-card.hidden {
  display: none;
}
.play-card:hover {
  border-color: var(--border-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
}

.play-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 0;
}

.play-number {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  background: var(--accent-glow);
  padding: 3px 8px;
  border-radius: 4px;
  flex-shrink: 0;
  min-width: 32px;
  text-align: center;
}

.play-name {
  font-size: 18px;
  font-weight: 700;
  flex: 1;
  letter-spacing: -0.3px;
}

.play-toggle {
  color: var(--text-dim);
  font-size: 20px;
  transition: transform 0.3s ease, color 0.3s ease;
  flex-shrink: 0;
  line-height: 1;
}
.play-card.open .play-toggle {
  transform: rotate(45deg);
  color: var(--accent);
}

.play-body {
  display: none;
  padding-top: 20px;
}
.play-card.open .play-body {
  display: block;
}

.play-hook {
  font-size: 16px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 16px;
  padding: 12px 16px;
  background: var(--accent-glow);
  border-radius: 8px;
  border-left: 3px solid var(--accent);
}

.play-section {
  margin-bottom: 14px;
}
.play-section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 6px;
}
.play-section-content {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.7;
}
.play-section-content ul {
  list-style: none;
  padding: 0;
}
.play-section-content li {
  padding-left: 16px;
  position: relative;
  margin-bottom: 4px;
}
.play-section-content li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 10px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--border-hover);
}

.play-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 16px;
}
.tag {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.tag-psych {
  color: var(--text-dim);
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--border);
}
.tag-best {
  color: #4FED7A;
  background: rgba(79, 237, 122, 0.1);
  border: 1px solid rgba(79, 237, 122, 0.2);
}
.tag-format {
  color: #ED9F4F;
  background: rgba(237, 159, 79, 0.1);
  border: 1px solid rgba(237, 159, 79, 0.2);
}

/* Theme Toggle */
.theme-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 50;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 8px 14px;
  cursor: pointer;
  color: var(--text-muted);
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 13px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.3s ease;
}
.theme-toggle:hover {
  border-color: var(--border-hover);
  color: var(--text);
}
.theme-toggle svg { width: 16px; height: 16px; }

/* Footer */
.footer {
  text-align: center;
  margin-top: 64px;
  font-size: 13px;
  color: var(--text-dim);
}

@keyframes slideUp {
  to { opacity: 1; transform: translateY(0); }
}

/* Responsive */
@media (max-width: 540px) {
  .container { padding: 28px 16px 40px; }
  .play-card { padding: 20px; }
  .play-name { font-size: 16px; }
  .logo { font-size: 28px; }
}
</style>
</head>

function renderPlays(filter) {
  const container = document.getElementById('playsContainer');
  container.innerHTML = '';

  PLAYS.forEach((play, i) => {
    const show = filter === 'all' || play.tags.includes(filter);

    const card = document.createElement('div');
    card.className = `play-card${show ? '' : ' hidden'}`;
    card.style.animationDelay = `${0.25 + (i * 0.03)}s`;
    card.onclick = () => card.classList.toggle('open');

    const structureHtml = play.structure.map(s => `<li>${escapeHtml(s)}</li>`).join('');
    const psychTags = play.psychology.map(p => `<span class="tag tag-psych">${escapeHtml(p)}</span>`).join('');
    const bestTags = play.bestFor.map(b => `<span class="tag tag-best">${escapeHtml(b)}</span>`).join('');

    card.innerHTML = `
      <div class="play-header">
        <span class="play-number">${play.number}</span>
        <span class="play-name">${escapeHtml(play.name)}</span>
        <span class="play-toggle">+</span>
      </div>
      <div class="play-body">
        <div class="play-hook">${escapeHtml(play.hook)}</div>
        <div class="play-section">
          <div class="play-section-title">Structure</div>
          <div class="play-section-content"><ul>${structureHtml}</ul></div>
        </div>
        <div class="play-section">
          <div class="play-section-title">Suggested Format</div>
          <div class="play-section-content"><span class="tag tag-format">${escapeHtml(play.format)}</span></div>
        </div>
        <div class="play-section">
          <div class="play-section-title">Value Angle</div>
          <div class="play-section-content" style="font-weight: 600; color: var(--accent);">${escapeHtml(play.valueAngle)}</div>
        </div>
        <div class="play-tags">
          ${psychTags}
          ${bestTags}
        </div>
      </div>
    `;

    container.appendChild(card);
  });
}

function filterPlays(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPlays(filter);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

renderPlays('all');

// Theme toggle
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'light' ? null : 'light';
  if (next) {
    html.setAttribute('data-theme', 'light');
    localStorage.setItem('paperboy-theme', 'light');
  } else {
    html.removeAttribute('data-theme');
    localStorage.setItem('paperboy-theme', 'dark');
  }
  updateThemeUI();
}

function updateThemeUI() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  document.getElementById('themeLabel').textContent = isLight ? 'Dark' : 'Light';
  document.getElementById('themeIcon').innerHTML = isLight
    ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>'
    : '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
}

// Apply saved theme on load
(function() {
  const saved = localStorage.getItem('paperboy-theme');
  if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
  }
  updateThemeUI();
})();
